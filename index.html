<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body { display: flex; flex-wrap: wrap; justify-content: center; }
        .image-container { margin: 10px; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="dancers.JPG" alt="Dancers">
    </div>
    <div class="image-container">
        <img src="food.webp" alt="Food">
    </div>
    <div class="image-container">
        <img src="lesotho-mountains.jpeg" alt="Lesotho Mountains">
    </div>
</body>
</html>
